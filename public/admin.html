<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #F7F8FA; --white: #fff; --border: #E8EAED;
  --accent: #2563EB; --accent-light: #EFF6FF;
  --success: #059669; --success-light: #ECFDF5;
  --danger: #DC2626; --danger-light: #FEF2F2;
  --gold: #D97706; --text: #111827; --text2: #6B7280; --text3: #9CA3AF;
}
body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); }
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.login-card { background:var(--white); border-radius:20px; padding:36px 28px; width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.08); }
.login-logo { text-align:center; margin-bottom:28px; }
.login-icon { width:60px; height:60px; background:var(--accent); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:26px; margin-bottom:10px; }
.login-title { font-size:20px; font-weight:700; }
.login-sub { font-size:13px; color:var(--text2); margin-top:3px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--text2); margin-bottom:6px; text-transform:uppercase; }
.field input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:12px 14px; font-size:15px; color:var(--text); outline:none; font-family:inherit; }
.field input:focus { border-color:var(--accent); background:var(--white); }
.btn-primary { width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
.error-msg { color:var(--danger); font-size:13px; text-align:center; margin-top:10px; }
.dashboard { display:none; }
.header { background:var(--white); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:17px; font-weight:700; }
.header p { font-size:11px; color:var(--text2); }
.logout-btn { background:var(--bg); border:1px solid var(--border); color:var(--text2); padding:8px 16px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; }
.content { padding:20px 24px; max-width:1200px; margin:0 auto; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
.stat-card { background:var(--white); border-radius:14px; padding:18px; border:1px solid var(--border); }
.stat-num { font-size:30px; font-weight:700; }
.stat-lbl { font-size:12px; color:var(--text3); margin-top:4px; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.section-title { font-size:16px; font-weight:700; }
.add-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
.merchants-table { background:var(--white); border-radius:16px; border:1px solid var(--border); overflow:hidden; }
.table-header { display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr 1.5fr; gap:12px; padding:12px 20px; background:var(--bg); font-size:11px; color:var(--text3); font-weight:600; text-transform:uppercase; }
.table-row { display:grid; grid-template-columns:2fr 1fr 1fr 1fr 1fr 1.5fr; gap:12px; padding:14px 20px; border-top:1px solid var(--border); align-items:center; }
.table-row:hover { background:var(--bg); }
.merchant-name { font-size:15px; font-weight:600; }
.merchant-phone { font-size:12px; color:var(--text2); margin-top:2px; }
.badge { display:inline-flex; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:600; }
.badge-active { background:var(--success-light); color:var(--success); }
.badge-inactive { background:var(--danger-light); color:var(--danger); }
.action-btn { border:none; padding:6px 12px; border-radius:7px; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; margin-left:4px; }
.btn-off { background:var(--danger-light); color:var(--danger); }
.btn-on { background:var(--success-light); color:var(--success); }
.btn-edit { background:var(--accent-light); color:var(--accent); }
.btn-link { background:#F0FDF4; color:#166534; font-size:10px; }
.btn-link2 { background:var(--accent-light); color:var(--accent); font-size:10px; }
.price-tag { font-size:13px; color:var(--gold); font-weight:600; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(8px); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:var(--white); border-radius:20px; padding:28px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
.modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.modal-grid .full { grid-column:1/-1; }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.btn-cancel { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text2); border-radius:10px; padding:12px; font-size:14px; cursor:pointer; font-family:inherit; }
.btn-save { flex:2; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-icon">⚙️</div>
      <div class="login-title">لوحة الإدارة</div>
      <div class="login-sub">نظام بطاقات الولاء — أصيل</div>
    </div>
    <div class="field"><label>البريد الإلكتروني</label><input type="email" id="login-email" placeholder="admin@loyalty.com" /></div>
    <div class="field"><label>كلمة السر</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <div><h1>لوحة الإدارة ⚙️</h1><p>نظام بطاقات الولاء</p></div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--accent)" id="stat-customers">-</div><div class="stat-lbl">إجمالي العملاء</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--success)" id="stat-active">-</div><div class="stat-lbl">تجار نشطين</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--gold)" id="stat-total">-</div><div class="stat-lbl">إجمالي التجار</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">التجار</div>
      <button class="add-btn" onclick="showAddModal()">+ إضافة تاجر</button>
    </div>
    <div class="merchants-table">
      <div class="table-header">
        <span>التاجر</span><span>العملاء</span><span>الختمات</span><span>الاشتراك</span><span>الحالة</span><span>إجراء</span>
      </div>
      <div id="merchants-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">إضافة تاجر جديد</div>
    <div class="modal-grid">
      <div class="full field"><label>اسم المحل</label><input type="text" id="m-name" placeholder="كافيه النخبة" /></div>
      <div class="field"><label>رقم الجوال</label><input type="tel" id="m-phone" placeholder="05xxxxxxxx" /></div>
      <div class="field"><label>PIN التاجر</label><input type="number" id="m-pin" placeholder="1234" /></div>
      <div class="field"><label>عدد الختمات</label><input type="number" id="m-stamps" value="4" min="1" max="20" /></div>
      <div class="field"><label>سعر الاشتراك (ر.س)</label><input type="number" id="m-price" placeholder="99" /></div>
      <div class="field"><label>تاريخ الاشتراك</label><input type="date" id="m-date" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal('add-modal')">إلغاء</button>
      <button class="btn-save" onclick="addMerchant()">إضافة</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">تعديل التاجر</div>
    <input type="hidden" id="edit-id" />
    <div class="modal-grid">
      <div class="full field"><label>اسم المحل</label><input type="text" id="e-name" /></div>
      <div class="field"><label>رقم الجوال</label><input type="tel" id="e-phone" /></div>
      <div class="field"><label>PIN</label><input type="number" id="e-pin" /></div>
      <div class="field"><label>عدد الختمات</label><input type="number" id="e-stamps" min="1" max="20" /></div>
      <div class="field"><label>سعر الاشتراك</label><input type="number" id="e-price" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal('edit-modal')">إلغاء</button>
      <button class="btn-save" onclick="saveMerchantEdit()">حفظ</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('admin_token') || '';
if (token) initDashboard();

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  try {
    const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password: pass}) });
    const data = await res.json();
    if (data.token) { token = data.token; localStorage.setItem('admin_token', token); initDashboard(); }
    else { document.getElementById('login-error').textContent = data.error || 'بيانات غلط'; }
  } catch(e) { document.getElementById('login-error').textContent = 'خطأ في الاتصال'; }
}
document.getElementById('login-pass').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });

function logout() { localStorage.removeItem('admin_token'); token=''; document.getElementById('dashboard').style.display='none'; document.getElementById('login-wrap').style.display='flex'; }

async function initDashboard() {
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
  loadStats(); loadMerchants();
}

async function loadStats() {
  const res = await fetch('/api/admin/stats', { headers: { Authorization: 'Bearer '+token } });
  const data = await res.json();
  if (data.error) { logout(); return; }
  document.getElementById('stat-total').textContent = data.totalMerchants;
  document.getElementById('stat-active').textContent = data.activeMerchants;
  document.getElementById('stat-customers').textContent = data.totalCustomers;
}

async function loadMerchants() {
  const res = await fetch('/api/admin/merchants', { headers: { Authorization: 'Bearer '+token } });
  const merchants = await res.json();
  if (!Array.isArray(merchants)) { logout(); return; }
  const origin = window.location.origin;
  document.getElementById('merchants-list').innerHTML = merchants.map(m => {
    return '<div class="table-row">' +
      '<div><div class="merchant-name">'+m.name+'</div><div class="merchant-phone">'+(m.phone||'')+'</div>' +
      '<div style="display:flex;gap:4px;margin-top:6px;">' +
      '<button class="action-btn btn-link" onclick="copyText(\''+origin+'/register/'+m.merchantId+'\')">📋 تسجيل</button>' +
      '<button class="action-btn btn-link2" onclick="copyText(\''+origin+'/merchant/'+m.merchantId+'\')">📋 لوحة</button>' +
      '</div></div>' +
      '<div>'+(m.customersCount||0)+'</div>' +
      '<div>'+(m.stampsRequired||4)+' ختمة</div>' +
      '<div class="price-tag">'+(m.subscriptionPrice||0)+' ر.س</div>' +
      '<div><span class="badge '+(m.active?'badge-active':'badge-inactive')+'">'+(m.active?'نشط':'موقف')+'</span></div>' +
      '<div><button class="action-btn '+(m.active?'btn-off':'btn-on')+'" onclick="toggleMerchant(\''+m.merchantId+'\')">'+(m.active?'إيقاف':'تفعيل')+'</button>' +
      '<button class="action-btn btn-edit" onclick=\'editMerchant('+JSON.stringify(m).replace(/'/g,"\\'")+')\'> تعديل</button></div>' +
      '</div>';
  }).join('');
}

function copyText(text) { navigator.clipboard.writeText(text).then(()=>alert('تم النسخ ✓')); }

async function toggleMerchant(id) {
  await fetch('/api/admin/merchants/'+id+'/toggle', { method:'PATCH', headers:{ Authorization:'Bearer '+token } });
  loadMerchants(); loadStats();
}

function showAddModal() { document.getElementById('m-date').value=new Date().toISOString().split('T')[0]; document.getElementById('add-modal').classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

async function addMerchant() {
  const name=document.getElementById('m-name').value.trim();
  const phone=document.getElementById('m-phone').value.trim();
  if (!name||!phone) { alert('اسم ورقم الجوال مطلوبان'); return; }
  const body = {
    name, phone,
    stampsRequired: parseInt(document.getElementById('m-stamps').value),
    subscriptionPrice: parseFloat(document.getElementById('m-price').value)||0,
    subscriptionDate: document.getElementById('m-date').value,
    pin: document.getElementById('m-pin').value
  };
  const res = await fetch('/api/admin/merchants', { method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify(body) });
  const data = await res.json();
  if (data.merchantId) { hideModal('add-modal'); loadMerchants(); loadStats(); alert('تم الإضافة ✓\nID: '+data.merchantId); }
  else { alert(data.error||'خطأ'); }
}

function editMerchant(m) {
  document.getElementById('edit-id').value=m.merchantId;
  document.getElementById('e-name').value=m.name||'';
  document.getElementById('e-phone').value=m.phone||'';
  document.getElementById('e-stamps').value=m.stampsRequired||4;
  document.getElementById('e-price').value=m.subscriptionPrice||0;
  document.getElementById('e-pin').value=m.pin||'';
  document.getElementById('edit-modal').classList.add('show');
}

async function saveMerchantEdit() {
  const id=document.getElementById('edit-id').value;
  const updates={
    name:document.getElementById('e-name').value.trim(),
    phone:document.getElementById('e-phone').value.trim(),
    stampsRequired:parseInt(document.getElementById('e-stamps').value),
    subscriptionPrice:parseFloat(document.getElementById('e-price').value),
    pin:document.getElementById('e-pin').value
  };
  const res=await fetch('/api/admin/merchants/'+id, { method:'PUT', headers:{'Content-Type':'application/json',Authorization:'Bearer '+token}, body:JSON.stringify(updates) });
  const data=await res.json();
  if (data.success) { hideModal('edit-modal'); loadMerchants(); alert('تم الحفظ ✓'); }
  else { alert(data.error||'خطأ'); }
}
</script>
</body>
</html>
