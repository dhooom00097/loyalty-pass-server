<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: #1a1a1a; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 400px; border: 1px solid #2a2a2a; }
.login-title { font-size: 22px; font-weight: 700; color: #F5C47A; text-align: center; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: #666; text-align: center; margin-bottom: 32px; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
input { width: 100%; background: #111; border: 1px solid #333; border-radius: 12px; padding: 14px 16px; font-size: 15px; color: #fff; outline: none; font-family: inherit; }
input:focus { border-color: #F5C47A; }
.btn-primary { width: 100%; background: #851109; color: #F5C47A; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
.btn-primary:hover { opacity: 0.9; }
.error-msg { color: #f44336; font-size: 13px; text-align: center; margin-top: 12px; }

/* Dashboard */
.dashboard { display: none; }
.header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 18px; font-weight: 700; color: #F5C47A; }
.logout-btn { background: #2a2a2a; border: none; color: #888; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; }
.content { padding: 24px; max-width: 1200px; margin: 0 auto; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #1a1a1a; border-radius: 16px; padding: 20px; border: 1px solid #2a2a2a; }
.stat-num { font-size: 32px; font-weight: 700; color: #F5C47A; }
.stat-lbl { font-size: 13px; color: #666; margin-top: 4px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 600; }
.add-btn { background: #851109; color: #F5C47A; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.merchants-table { background: #1a1a1a; border-radius: 16px; border: 1px solid #2a2a2a; overflow: hidden; }
.table-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; padding: 14px 20px; background: #222; font-size: 12px; color: #666; }
.table-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; padding: 16px 20px; border-top: 1px solid #2a2a2a; align-items: center; }
.table-row:hover { background: #1f1f1f; }
.merchant-name { font-size: 15px; font-weight: 500; }
.merchant-phone { font-size: 13px; color: #888; margin-top: 2px; }
.badge-active { background: #1a4a1a; color: #4CAF50; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
.badge-inactive { background: #4a1a1a; color: #f44336; padding: 4px 10px; border-radius: 999px; font-size: 12px; }
.toggle-btn { background: #2a2a2a; border: none; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; }
.toggle-btn:hover { background: #333; }
.price-tag { font-size: 13px; color: #F5C47A; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: #1a1a1a; border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; border: 1px solid #2a2a2a; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #F5C47A; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.modal-grid .full { grid-column: 1 / -1; }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-cancel { flex: 1; background: #2a2a2a; border: none; color: #fff; border-radius: 12px; padding: 14px; font-size: 15px; cursor: pointer; font-family: inherit; }
.btn-save { flex: 2; background: #851109; color: #F5C47A; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.color-preview { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #333; margin-top: 8px; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-title">🔐 لوحة الإدارة</div>
    <div class="login-sub">نظام بطاقات الولاء</div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="admin@example.com" />
    </div>
    <div class="field">
      <label>كلمة السر</label>
      <input type="password" id="login-pass" placeholder="••••••••" />
    </div>
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="header-title">⚙️ لوحة الإدارة</div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-lbl">إجمالي التجار</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-active">-</div><div class="stat-lbl">تجار نشطين</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-customers">-</div><div class="stat-lbl">إجمالي العملاء</div></div>
    </div>

    <div class="section-header">
      <div class="section-title">التجار</div>
      <button class="add-btn" onclick="showAddModal()">+ إضافة تاجر</button>
    </div>

    <div class="merchants-table">
      <div class="table-header">
        <span>التاجر</span>
        <span>العملاء</span>
        <span>الختمات</span>
        <span>سعر الاشتراك</span>
        <span>الحالة</span>
        <span>إجراء</span>
      </div>
      <div id="merchants-list"></div>
    </div>
  </div>
</div>

<!-- Modal إضافة تاجر -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">إضافة تاجر جديد</div>
    <div class="modal-grid">
      <div class="full field"><label>اسم المحل</label><input type="text" id="m-name" placeholder="حدق الشاي" /></div>
      <div class="field"><label>PIN التاجر (4 أرقام)</label><input type="number" id="m-pin" placeholder="1234" max="9999" min="1000" /></div>
      <div class="field"><label>رقم الجوال</label><input type="tel" id="m-phone" placeholder="05xxxxxxxx" /></div>
      <div class="field"><label>عدد الختمات للهدية</label><input type="number" id="m-stamps" value="4" min="1" max="20" /></div>
      <div class="field"><label>سعر الاشتراك (ريال)</label><input type="number" id="m-price" placeholder="99" /></div>
      <div class="field"><label>تاريخ الاشتراك</label><input type="date" id="m-date" /></div>
      <div class="field"><label>لون البطاقة</label><input type="color" id="m-color" value="#851109" /><div class="color-preview" id="color-preview" style="background:#851109;"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideAddModal()">إلغاء</button>
      <button class="btn-save" onclick="addMerchant()">حفظ التاجر</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('admin_token') || '';

if (token) initDashboard();

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      localStorage.setItem('admin_token', token);
      initDashboard();
    } else {
      document.getElementById('login-error').textContent = data.error || 'بيانات غلط';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'خطأ في الاتصال';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  token = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

async function initDashboard() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats();
  loadMerchants();
}

async function loadStats() {
  const res = await fetch('/api/admin/stats', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if (data.error) { logout(); return; }
  document.getElementById('stat-total').textContent = data.totalMerchants;
  document.getElementById('stat-active').textContent = data.activeMerchants;
  document.getElementById('stat-customers').textContent = data.totalCustomers;
}

async function loadMerchants() {
  const res = await fetch('/api/admin/merchants', { headers: { Authorization: 'Bearer ' + token } });
  const merchants = await res.json();
  if (!Array.isArray(merchants)) { logout(); return; }
  const list = document.getElementById('merchants-list');
  list.innerHTML = merchants.map(m => `
    <div class="table-row">
      <div><div class="merchant-name">${m.name}</div><div class="merchant-phone">${m.phone || ''}</div></div>
      <div>${m.customersCount || 0}</div>
      <div>${m.stampsRequired || 4} ختمة</div>
      <div class="price-tag">${m.subscriptionPrice || 0} ر.س</div>
      <div><span class="${m.active ? 'badge-active' : 'badge-inactive'}">${m.active ? 'نشط' : 'موقف'}</span></div>
      <div style="display:flex;gap:6px;"><button class="toggle-btn" onclick="toggleMerchant('${m.merchantId}', this)">${m.active ? 'إيقاف' : 'تفعيل'}</button><button class="toggle-btn" style="background:#2a1a0a;color:#F5C47A;" onclick="editMerchant(${JSON.stringify(m).replace(/'/g, '&#39;')})">تعديل</button></div>
    </div>
  `).join('');
}

async function toggleMerchant(merchantId, btn) {
  const res = await fetch(`/api/admin/merchants/${merchantId}/toggle`, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + token }
  });
  const data = await res.json();
  loadMerchants();
  loadStats();
}

function showAddModal() {
  document.getElementById('m-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('add-modal').classList.add('show');
}

function hideAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

document.getElementById('m-color').addEventListener('input', e => {
  document.getElementById('color-preview').style.background = e.target.value;
});

async function addMerchant() {
  const name = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const stamps = parseInt(document.getElementById('m-stamps').value);
  const price = parseFloat(document.getElementById('m-price').value);
  const date = document.getElementById('m-date').value;
  const colorHex = document.getElementById('m-color').value;
  const r = parseInt(colorHex.slice(1,3),16);
  const g = parseInt(colorHex.slice(3,5),16);
  const b = parseInt(colorHex.slice(5,7),16);
  const color = `rgb(${r}, ${g}, ${b})`;

  if (!name || !phone) { alert('اسم ورقم الجوال مطلوبان'); return; }

  const res = await fetch('/api/admin/merchants', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ name, phone, color, stampsRequired: stamps, subscriptionPrice: price, subscriptionDate: date, pin: document.getElementById("m-pin").value })
  });
  const data = await res.json();
  if (data.merchantId) {
    hideAddModal();
    loadMerchants();
    loadStats();
    alert('تم إضافة التاجر ✓\nالـ merchantId: ' + data.merchantId);
  } else {
    alert(data.error || 'خطأ');
  }
}

document.getElementById('login-pass').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLogin();
});

function editMerchant(m) {
  document.getElementById('edit-id').value = m.merchantId;
  document.getElementById('e-name').value = m.name || '';
  document.getElementById('e-phone').value = m.phone || '';
  document.getElementById('e-stamps').value = m.stampsRequired || 4;
  document.getElementById('e-price').value = m.subscriptionPrice || 0;
  document.getElementById('e-pin').value = m.pin || '';
  document.getElementById('e-color').value = '#851109';
  document.getElementById('edit-modal').classList.add('show');
}

async function saveMerchantEdit() {
  const merchantId = document.getElementById('edit-id').value;
  const colorHex = document.getElementById('e-color').value;
  const r = parseInt(colorHex.slice(1,3),16);
  const g = parseInt(colorHex.slice(3,5),16);
  const b = parseInt(colorHex.slice(5,7),16);
  const updates = {
    name: document.getElementById('e-name').value.trim(),
    phone: document.getElementById('e-phone').value.trim(),
    stampsRequired: parseInt(document.getElementById('e-stamps').value),
    subscriptionPrice: parseFloat(document.getElementById('e-price').value),
    color: 'rgb(' + r + ', ' + g + ', ' + b + ')',
    pin: document.getElementById('e-pin').value
  };
  const res = await fetch('/api/admin/merchants/' + merchantId, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(updates)
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('edit-modal').classList.remove('show');
    loadMerchants();
    alert('تم الحفظ ✓');
  } else { alert(data.error || 'خطأ'); }
}
</script>
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">تعديل التاجر</div>
    <input type="hidden" id="edit-id" />
    <div class="modal-grid">
      <div class="full field"><label>اسم المحل</label><input type="text" id="e-name" /></div>
      <div class="field"><label>رقم الجوال</label><input type="tel" id="e-phone" /></div>
      <div class="field"><label>عدد الختمات</label><input type="number" id="e-stamps" min="1" max="20" /></div>
      <div class="field"><label>سعر الاشتراك</label><input type="number" id="e-price" /></div>
      <div class="field"><label>PIN (4 أرقام)</label><input type="number" id="e-pin" placeholder="1234" min="1000" max="9999" /></div>
      <div class="field"><label>لون البطاقة</label><input type="color" id="e-color" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('edit-modal').classList.remove('show')">إلغاء</button>
      <button class="btn-save" onclick="saveMerchantEdit()">حفظ</button>
    </div>
  </div>
</div>
</body>
</html>
