<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: rgba(255,255,255,0.08);
  --accent: #6c63ff;
  --accent2: #a855f7;
  --text: #f0f0ff;
  --text2: #8888aa;
  --success: #22c55e;
  --danger: #ef4444;
  --gold: #f59e0b;
}
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--surface); border-radius: 24px; padding: 44px 36px; width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 24px 80px rgba(108,99,255,0.15); }
.login-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
.login-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.login-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 36px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; transition: border-color 0.2s; }
.field input:focus { border-color: var(--accent); }
.btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
.error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; }
.dashboard { display: none; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.header-title { font-size: 20px; font-weight: 700; color: #fff; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 13px; }
.content { padding: 24px; max-width: 1100px; margin: 0 auto; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border-radius: 18px; padding: 22px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.stat-num { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-lbl { font-size: 13px; color: var(--text2); margin-top: 4px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 600; }
.add-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.merchants-table { background: var(--surface); border-radius: 18px; border: 1px solid var(--border); overflow: hidden; }
.table-header { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; padding: 14px 20px; background: var(--surface2); font-size: 12px; color: var(--text2); font-weight: 600; }
.table-row { display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; padding: 16px 20px; border-top: 1px solid var(--border); align-items: center; }
.table-row:hover { background: var(--surface2); }
.merchant-name { font-size: 15px; font-weight: 600; }
.merchant-phone { font-size: 12px; color: var(--text2); margin-top: 2px; }
.merchant-link { font-size: 11px; color: var(--accent); margin-top: 3px; word-break: break-all; }
.merchant-link-green { font-size: 11px; color: var(--success); margin-top: 2px; word-break: break-all; }
.badge-active { background: rgba(34,197,94,0.15); color: var(--success); padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.badge-inactive { background: rgba(239,68,68,0.15); color: var(--danger); padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.action-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; }
.edit-btn { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; }
.price-tag { font-size: 13px; color: var(--gold); font-weight: 600; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border-radius: 20px; padding: 32px; width: 100%; max-width: 500px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.modal-grid .full { grid-column: 1 / -1; }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.btn-cancel { flex: 1; background: var(--surface2); border: none; color: var(--text2); border-radius: 12px; padding: 14px; font-size: 15px; cursor: pointer; font-family: inherit; }
.btn-save { flex: 2; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.mfield { margin-bottom: 4px; }
.mfield label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.mfield input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; }
.mfield input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-icon">⚙️</div>
    <div class="login-title">لوحة الإدارة</div>
    <div class="login-sub">نظام بطاقات الولاء</div>
    <div class="field"><label>البريد الإلكتروني</label><input type="email" id="login-email" placeholder="admin@example.com" /></div>
    <div class="field"><label>كلمة السر</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <div class="header">
    <div>
      <div class="header-title">⚙️ لوحة الإدارة</div>
      <div class="header-sub">نظام بطاقات الولاء</div>
    </div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-lbl">إجمالي التجار</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-active">-</div><div class="stat-lbl">تجار نشطين</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-customers">-</div><div class="stat-lbl">إجمالي العملاء</div></div>
    </div>
    <div class="section-header">
      <div class="section-title">التجار</div>
      <button class="add-btn" onclick="showAddModal()">+ إضافة تاجر</button>
    </div>
    <div class="merchants-table">
      <div class="table-header">
        <span>التاجر</span><span>العملاء</span><span>الختمات</span><span>الاشتراك</span><span>الحالة</span><span>إجراء</span>
      </div>
      <div id="merchants-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">+ إضافة تاجر جديد</div>
    <div class="modal-grid">
      <div class="full mfield"><label>اسم المحل</label><input type="text" id="m-name" placeholder="حدق الشاي" /></div>
      <div class="mfield"><label>رقم الجوال</label><input type="tel" id="m-phone" placeholder="05xxxxxxxx" /></div>
      <div class="mfield"><label>PIN التاجر (4 أرقام)</label><input type="number" id="m-pin" placeholder="1234" min="1000" max="9999" /></div>
      <div class="mfield"><label>عدد الختمات للهدية</label><input type="number" id="m-stamps" value="4" min="1" max="20" /></div>
      <div class="mfield"><label>سعر الاشتراك (ريال)</label><input type="number" id="m-price" placeholder="99" /></div>
      <div class="mfield"><label>تاريخ الاشتراك</label><input type="date" id="m-date" /></div>
      <div class="mfield"><label>لون البطاقة</label><input type="color" id="m-color" value="#851109" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideAddModal()">إلغاء</button>
      <button class="btn-save" onclick="addMerchant()">حفظ التاجر</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">تعديل التاجر</div>
    <div class="modal-grid">
      <div class="full mfield"><label>اسم المحل</label><input type="text" id="e-name" /></div>
      <div class="mfield"><label>رقم الجوال</label><input type="tel" id="e-phone" /></div>
      <div class="mfield"><label>PIN التاجر</label><input type="number" id="e-pin" placeholder="1234" min="1000" max="9999" /></div>
      <div class="mfield"><label>عدد الختمات</label><input type="number" id="e-stamps" min="1" max="20" /></div>
      <div class="mfield"><label>سعر الاشتراك</label><input type="number" id="e-price" /></div>
      <div class="mfield"><label>تاريخ الاشتراك</label><input type="date" id="e-date" /></div>
      <div class="mfield"><label>لون البطاقة</label><input type="color" id="e-color" value="#851109" /></div>
    </div>
    <input type="hidden" id="e-id" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideEditModal()">إلغاء</button>
      <button class="btn-save" onclick="saveMerchantEdit()">حفظ التغييرات</button>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('admin_token') || '';
if (token) initDashboard();

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (data.token) { token = data.token; localStorage.setItem('admin_token', token); initDashboard(); }
    else document.getElementById('login-error').textContent = data.error || 'بيانات غلط';
  } catch(e) { document.getElementById('login-error').textContent = 'خطأ في الاتصال'; }
}

function logout() {
  localStorage.removeItem('admin_token'); token = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

function initDashboard() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats(); loadMerchants();
}

async function loadStats() {
  const res = await fetch('/api/admin/stats', { headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if (data.error) { logout(); return; }
  document.getElementById('stat-total').textContent = data.totalMerchants;
  document.getElementById('stat-active').textContent = data.activeMerchants;
  document.getElementById('stat-customers').textContent = data.totalCustomers;
}

async function loadMerchants() {
  const res = await fetch('/api/admin/merchants', { headers: { Authorization: 'Bearer ' + token } });
  const merchants = await res.json();
  if (!Array.isArray(merchants)) { logout(); return; }
  const base = window.location.origin;
  document.getElementById('merchants-list').innerHTML = merchants.map(function(m) {
    return '<div class="table-row">' +
      '<div><div class="merchant-name">' + m.name + '</div><div class="merchant-phone">' + (m.phone||'') + '</div>' +
      '<div class="merchant-link">⚙️ ' + base + '/merchant/' + m.merchantId + '</div>' +
      '<div class="merchant-link-green">📋 ' + base + '/register/' + m.merchantId + '</div></div>' +
      '<div>' + (m.customersCount||0) + '</div>' +
      '<div>' + (m.stampsRequired||4) + ' ختمة</div>' +
      '<div class="price-tag">' + (m.subscriptionPrice||0) + ' ر.س</div>' +
      '<div><span class="' + (m.active ? 'badge-active' : 'badge-inactive') + '">' + (m.active ? 'نشط' : 'موقف') + '</span></div>' +
      '<div class="action-btns">' +
      '<button class="toggle-btn" onclick="toggleMerchant(\'' + m.merchantId + '\')">' + (m.active ? 'إيقاف' : 'تفعيل') + '</button>' +
      '<button class="edit-btn" onclick="showEditModal(\'' + m.merchantId + '\',\'' + m.name + '\',\'' + (m.phone||'') + '\',' + (m.stampsRequired||4) + ',' + (m.subscriptionPrice||0) + ',\'' + (m.pin||'') + '\',\'' + (m.subscriptionDate||'') + '\')">تعديل</button>' +
      '</div></div>';
  }).join('');
}

async function toggleMerchant(merchantId) {
  await fetch('/api/admin/merchants/' + merchantId + '/toggle', { method: 'PATCH', headers: { Authorization: 'Bearer ' + token } });
  loadMerchants(); loadStats();
}

function showAddModal() { document.getElementById('m-date').value = new Date().toISOString().split('T')[0]; document.getElementById('add-modal').classList.add('show'); }
function hideAddModal() { document.getElementById('add-modal').classList.remove('show'); }

async function addMerchant() {
  const name = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const stamps = parseInt(document.getElementById('m-stamps').value);
  const price = parseFloat(document.getElementById('m-price').value) || 0;
  const date = document.getElementById('m-date').value;
  const pin = document.getElementById('m-pin').value;
  const colorHex = document.getElementById('m-color').value;
  const r = parseInt(colorHex.slice(1,3),16), g = parseInt(colorHex.slice(3,5),16), b = parseInt(colorHex.slice(5,7),16);
  if (!name || !phone) { alert('اسم ورقم الجوال مطلوبان'); return; }
  const res = await fetch('/api/admin/merchants', {
    method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ name, phone, color: 'rgb('+r+','+g+','+b+')', stampsRequired: stamps, subscriptionPrice: price, subscriptionDate: date, pin })
  });
  const data = await res.json();
  if (data.merchantId) {
    hideAddModal(); loadMerchants(); loadStats();
    alert('تم إضافة التاجر\nلوحة التاجر: ' + window.location.origin + '/merchant/' + data.merchantId + '\nرابط التسجيل: ' + window.location.origin + '/register/' + data.merchantId);
  } else { alert(data.error || 'خطأ'); }
}

function showEditModal(merchantId, name, phone, stamps, price, pin, date) {
  document.getElementById('e-id').value = merchantId;
  document.getElementById('e-name').value = name;
  document.getElementById('e-phone').value = phone;
  document.getElementById('e-stamps').value = stamps;
  document.getElementById('e-price').value = price;
  document.getElementById('e-pin').value = pin;
  document.getElementById('e-date').value = date ? date.split('T')[0] : '';
  document.getElementById('edit-modal').classList.add('show');
}
function hideEditModal() { document.getElementById('edit-modal').classList.remove('show'); }

async function saveMerchantEdit() {
  const merchantId = document.getElementById('e-id').value;
  const colorHex = document.getElementById('e-color').value;
  const r = parseInt(colorHex.slice(1,3),16), g = parseInt(colorHex.slice(3,5),16), b = parseInt(colorHex.slice(5,7),16);
  const updates = {
    name: document.getElementById('e-name').value.trim(),
    phone: document.getElementById('e-phone').value.trim(),
    stampsRequired: parseInt(document.getElementById('e-stamps').value),
    subscriptionPrice: parseFloat(document.getElementById('e-price').value) || 0,
    subscriptionDate: document.getElementById('e-date').value,
    color: 'rgb('+r+','+g+','+b+')',
    pin: document.getElementById('e-pin').value
  };
  const res = await fetch('/api/admin/merchants/' + merchantId, {
    method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify(updates)
  });
  const data = await res.json();
  if (data.success) { hideEditModal(); loadMerchants(); alert('تم الحفظ'); }
  else { alert(data.error || 'خطأ'); }
}

document.getElementById('login-pass').addEventListener('keypress', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
